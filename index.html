<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<link rel="icon" type="image/svg+xml" href="/MA.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Mohammad Ahmad</title>
		<script id="set-theme">
			function setTheme(newTheme) {
				if (newTheme === 'dark') document.documentElement.classList.add('dark');
				else document.documentElement.classList.remove('dark');
			}

			var preferredTheme = null;
			try {
				preferredTheme = localStorage.getItem('theme');
			} catch (_) {}

			if (
				preferredTheme &&
				(preferredTheme === 'dark' || preferredTheme === 'light')
			) {
				setTheme(preferredTheme);
			} else {
				localStorage.setItem('theme', 'system');
				var systemTheme = window.matchMedia('(prefers-color-scheme: dark)')
					.matches
					? 'dark'
					: 'light';
				setTheme(systemTheme);
			}
		</script>
		<script id="404-redirect">
			// Restore the path that was encoded by 404.html.
			(function () {
				var redirect = window.location.search;
				if (redirect.startsWith('?/')) {
					var parts = redirect.slice(2).split('&');
					var path = parts[0];
					var query = parts[1] ? '?' + parts[1] : '';
					window.history.replaceState(
						null,
						null,
						'/' + path + query + window.location.hash,
					);
				}
			})();
		</script>
	</head>
	<body
		class="w-full h-full min-w-xs bg-slate-50 dark:bg-slate-950 text-neutral-800 dark:text-neutral-200">
		<div id="root"></div>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
